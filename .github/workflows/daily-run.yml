name: Pipeline Illuminazione Pubblica

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline.js
      - name: Commit dataset e report
        run: |
          git config user.name "illuminazione-bot"
          git config user.email "bot@illuminazione-monitor"
          git add docs/illuminazione.json reports/
          git diff --cached --quiet && echo "Nessun aggiornamento" || (
            git commit -m "run: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          )
